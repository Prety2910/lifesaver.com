<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Tracking - LifeSaver Cloud</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0a0c10; color:#fff; padding:20px; }
    #map { width:100%; height:420px; border-radius:12px; margin-top:16px; }
    .card { background:#111419; padding:16px; border-radius:12px; border:1px solid #1f2430; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Live Tracking</h2>
    <p id="status">Loading…</p>
    <p id="coords"></p>
    <div id="map"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAUVrkqQ-_f3bm0sNZDukkgzJdkYgYSdeA",
      authDomain: "lifesaver-cloud.firebaseapp.com",
      projectId: "lifesaver-cloud",
      storageBucket: "lifesaver-cloud.firebasestorage.app",
      messagingSenderId: "525052016690",
      appId: "1:525052016690:web:e144bda9ab58ea5291242b",
      measurementId: "G-BVX758S87W"
    });

    const db = firebase.firestore();
    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid');

    let map;
    let marker;

    function initMap(lat = 12.9716, lng = 77.5946) {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat, lng },
        zoom: 15
      });

      marker = new google.maps.Marker({
        position: { lat, lng },
        map
      });
    }

    async function loadTracking() {
      if (!uid) {
        document.getElementById('status').textContent = 'Missing tracking user id';
        return;
      }

      const ref = db.collection('users').doc(uid).collection('tracking').doc('live');

      ref.onSnapshot(doc => {
        if (!doc.exists) {
          document.getElementById('status').textContent = 'No live tracking found';
          return;
        }

        const data = doc.data();
        document.getElementById('status').textContent = data.active ? 'Tracking active' : 'Tracking inactive';
        document.getElementById('coords').textContent = `${data.lat}, ${data.lng}`;

        if (!map) {
          initMap(data.lat, data.lng);
        } else {
          const pos = { lat: data.lat, lng: data.lng };
          marker.setPosition(pos);
          map.setCenter(pos);
        }
      });
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCYiHRGXwAjgkFA86_GbON0h9dSDTi1rJ8"></script>
  <script>loadTracking();</script>
</body>
</html
